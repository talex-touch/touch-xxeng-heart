name: Auto Version Release

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: auto-version-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare-release:
    name: Bump version and changelog
    if: github.event_name == 'workflow_dispatch' || (github.actor != 'github-actions[bot]' && !startsWith(github.event.head_commit.message, 'chore(release):'))
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.7.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare version and changelog
        id: release
        run: pnpm run release:prepare

      - name: Lint
        if: steps.release.outputs.changed == 'true'
        run: pnpm lint

      - name: Typecheck
        if: steps.release.outputs.changed == 'true'
        run: pnpm typecheck

      - name: Unit test
        if: steps.release.outputs.changed == 'true'
        run: pnpm test

      - name: Commit version and tag
        if: steps.release.outputs.changed == 'true'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json CHANGELOG.md
          git commit -m "chore(release): ${{ steps.release.outputs.tag }}"
          git tag "${{ steps.release.outputs.tag }}"
          git push origin "HEAD:${{ github.ref_name }}"
          git push origin "${{ steps.release.outputs.tag }}"
